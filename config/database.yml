# PostgreSQL configuration
# Supports both local PostgreSQL and external services like Supabase via DATABASE_URL

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { "5432" } %>
  user: <%= ENV.fetch("POSTGRES_USER") { nil } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { nil } %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "maybe_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "maybe_test" } %>

# Production configuration
# Supports DATABASE_URL for services like Supabase, Neon, etc.
# Solid Queue and Solid Cache use the same database (simpler for self-hosting)
production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "maybe_production" } %>
    url: <%= ENV["DATABASE_URL"] %>
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
