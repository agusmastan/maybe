# Solid Queue configuration
# Optimized for low-memory self-hosting (NAS with Supabase)

default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: 1
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      concurrency_maintenance_interval: 300
  workers:
    - queues: [scheduled, high_priority]
      threads: 2
      processes: 1
      polling_interval: 1
    - queues: [medium_priority, low_priority, default]
      threads: 2
      processes: 1
      polling_interval: 2
